name = "lark-report-bot"
main = "src/index.js"
compatibility_date = "2026-04-24"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[[kv_namespaces]]
binding = "REPORT_SESSIONS"
id = "d68d367f9db54e5f8c5067c3cca0077b"

[vars]
LARK_API_URL           = "https://open.larksuite.com/open-apis"
CLAUDE_MODEL           = "claude-sonnet-4-6"
FORKLIFT_PDI_DOC_TOKEN = "<从 API Explorer 拿到的叉车模板 obj_token>"
LOADER_PDI_DOC_TOKEN   = "<从 API Explorer 拿到的装载机模板 obj_token>"